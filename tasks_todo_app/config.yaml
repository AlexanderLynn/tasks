---
name: "Tasks Todo App"
description: "A scheduling and collaboration app for Home Assistant with MCP server integration"
version: "0.1.8"
slug: "tasks_todo_app"
url: "https://github.com/AlexanderLynn/tasks"
init: false
arch:
  - amd64
  - aarch64
  - armv7
ports:
  8080/tcp: 8080
  3000/tcp: 3000
  8237/tcp: 8237
webui: http://[HOST]:[PORT:8237]
map:
  - config:rw
  - share:rw
options:
  api_key: "default-key-change-me"
  timezone: "UTC"
  enable_mcp_server: false
  mcp_port: 3000
  log_level: "info"
schema:
  api_key: str
  timezone: str
  enable_mcp_server: bool
  mcp_port: int
  log_level: list(debug|info|warn|error)
