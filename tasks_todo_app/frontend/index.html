<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tasks-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Tasks</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        function logBoot(stage, detail) {
          try {
            var url = new URL('/frontend-log', window.location.origin);
            url.searchParams.set('stage', stage);
            if (detail) {
              url.searchParams.set('detail', String(detail).slice(0, 500));
            }
            console.log('[tasks-boot-inline]', stage, detail || '');
            if (navigator.sendBeacon) {
              navigator.sendBeacon(url.toString());
            } else {
              fetch(url.toString(), { method: 'GET', cache: 'no-store', keepalive: true }).catch(function () {});
            }
          } catch (error) {
            console.error('[tasks-boot-inline] logging failed', error);
          }
        }

        window.__tasksBootLog = window.__tasksBootLog || [];
        window.__tasksBootLog.push({ stage: 'inline_script_loaded' });
        logBoot('inline_script_loaded', navigator.userAgent);
        window.addEventListener('error', function (event) {
          logBoot(
            'inline_window_error',
            String(event.message || 'unknown') + ' @ ' + event.filename + ':' + event.lineno + ':' + event.colno,
          );
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
