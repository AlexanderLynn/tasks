services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: habit-tracker-api
    ports:
      - "8080:8080"
    environment:
      - API_PORT=8080
      - MCP_ENABLED=false
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    container_name: habit-tracker-mcp
    ports:
      - "3000:3000"
    environment:
      - MCP_PORT=3000
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
